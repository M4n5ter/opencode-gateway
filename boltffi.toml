[package]
name = "opencode-gateway"
crate = "opencode-gateway-ffi"

[targets.wasm]
enabled = true
output = "dist/wasm"
artifact_path = "target/wasm32-unknown-unknown/release/opencode_gateway_ffi.wasm"

[targets.wasm.optimize]
enabled = false

[targets.wasm.typescript]
output = "dist/wasm/generated"
runtime_package = "@boltffi/runtime"
module_name = "opencode_gateway_binding"

[targets.wasm.npm]
output = "dist/wasm/pkg"
package_name = "opencode-gateway-binding"
targets = ["nodejs"]
generate_package_json = true
generate_readme = false
